<svg width="200" height="220" viewBox="0 0 200 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Antenna -->
  <rect x="95" y="4" width="10" height="22" rx="5" fill="#5AA9FF"/>
  <circle cx="100" cy="4" r="7" fill="#2F80ED"/>
  <circle cx="100" cy="4" r="4" fill="#F5FBFF"/>

  <!-- Head shadow -->
  <ellipse cx="100" cy="76" rx="52" ry="8" fill="rgba(47,128,237,0.10)"/>

  <!-- Head -->
  <rect x="34" y="22" width="132" height="100" rx="36" fill="url(#headGrad)"/>
  <!-- Head highlight -->
  <ellipse cx="80" cy="38" rx="28" ry="10" fill="rgba(255,255,255,0.45)"/>

  <!-- Left eye socket -->
  <circle cx="72" cy="68" r="20" fill="white"/>
  <circle cx="72" cy="68" r="20" fill="url(#eyeSocketL)" opacity="0.15"/>
  <!-- Left eye iris -->
  <circle cx="72" cy="68" r="14" fill="url(#irisGrad)"/>
  <!-- Left eye pupil -->
  <circle cx="72" cy="68" r="7" fill="#1A5FBF"/>
  <!-- Left eye shine -->
  <circle cx="67" cy="63" r="4" fill="white" opacity="0.9"/>
  <circle cx="76" cy="72" r="2" fill="white" opacity="0.5"/>

  <!-- Right eye socket -->
  <circle cx="128" cy="68" r="20" fill="white"/>
  <circle cx="128" cy="68" r="20" fill="url(#eyeSocketR)" opacity="0.15"/>
  <!-- Right eye iris -->
  <circle cx="128" cy="68" r="14" fill="url(#irisGrad)"/>
  <!-- Right eye pupil -->
  <circle cx="128" cy="68" r="7" fill="#1A5FBF"/>
  <!-- Right eye shine -->
  <circle cx="123" cy="63" r="4" fill="white" opacity="0.9"/>
  <circle cx="132" cy="72" r="2" fill="white" opacity="0.5"/>

  <!-- Smile -->
  <path d="M68 96 Q100 118 132 96" stroke="#2F80ED" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Cheek blush left -->
  <ellipse cx="52" cy="88" rx="10" ry="6" fill="#FFB3C6" opacity="0.45"/>
  <!-- Cheek blush right -->
  <ellipse cx="148" cy="88" rx="10" ry="6" fill="#FFB3C6" opacity="0.45"/>

  <!-- Neck -->
  <rect x="86" y="120" width="28" height="14" rx="6" fill="#5AA9FF"/>

  <!-- Body -->
  <rect x="44" y="132" width="112" height="72" rx="24" fill="url(#bodyGrad)"/>
  <!-- Body highlight -->
  <ellipse cx="100" cy="144" rx="36" ry="8" fill="rgba(255,255,255,0.30)"/>

  <!-- Chest panel -->
  <rect x="68" y="148" width="64" height="36" rx="12" fill="white" opacity="0.85"/>
  <!-- Panel dot 1 -->
  <circle cx="84" cy="162" r="5" fill="#2F80ED"/>
  <circle cx="84" cy="162" r="3" fill="#5AA9FF"/>
  <!-- Panel dot 2 -->
  <circle cx="100" cy="162" r="5" fill="#2F80ED"/>
  <circle cx="100" cy="162" r="3" fill="#5AA9FF"/>
  <!-- Panel dot 3 -->
  <circle cx="116" cy="162" r="5" fill="#2F80ED"/>
  <circle cx="116" cy="162" r="3" fill="#5AA9FF"/>
  <!-- Panel bar -->
  <rect x="78" y="174" width="44" height="5" rx="2.5" fill="#C1E1FF"/>

  <!-- Left arm -->
  <rect x="18" y="136" width="28" height="52" rx="14" fill="url(#armGrad)"/>
  <circle cx="32" cy="192" r="10" fill="#5AA9FF"/>

  <!-- Right arm -->
  <rect x="154" y="136" width="28" height="52" rx="14" fill="url(#armGrad)"/>
  <circle cx="168" cy="192" r="10" fill="#5AA9FF"/>

  <!-- Feet -->
  <rect x="62" y="200" width="32" height="16" rx="8" fill="#5AA9FF"/>
  <rect x="106" y="200" width="32" height="16" rx="8" fill="#5AA9FF"/>

  <defs>
    <linearGradient id="headGrad" x1="34" y1="22" x2="166" y2="122" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5FBFF"/>
      <stop offset="100%" stop-color="#C1E1FF"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="44" y1="132" x2="156" y2="204" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5AA9FF"/>
      <stop offset="100%" stop-color="#2F80ED"/>
    </linearGradient>
    <linearGradient id="armGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7EC8FF"/>
      <stop offset="100%" stop-color="#2F80ED"/>
    </linearGradient>
    <radialGradient id="irisGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#5AA9FF"/>
      <stop offset="100%" stop-color="#2F80ED"/>
    </radialGradient>
    <radialGradient id="eyeSocketL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2F80ED"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="eyeSocketR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2F80ED"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
</svg>
