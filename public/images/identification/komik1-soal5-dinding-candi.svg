<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="sky5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#sky5)"/>
  <!-- Ground -->
  <rect x="0" y="420" width="800" height="80" fill="#86efac"/>

  <!-- Candi tampak perspektif 3/4 -->
  <!-- Sisi depan (PRISMA — highlighted) -->
  <rect x="200" y="160" width="280" height="260" fill="#d6d3d1" rx="4"/>
  <!-- Highlight sisi depan -->
  <rect x="200" y="160" width="280" height="260" fill="none" stroke="#f97316" stroke-width="6" rx="4"/>

  <!-- Sisi samping (perspektif) -->
  <polygon points="480,160 560,120 560,380 480,420" fill="#b5b0ac"/>
  <!-- Highlight sisi samping -->
  <polygon points="480,160 560,120 560,380 480,420" fill="none" stroke="#f97316" stroke-width="4"/>

  <!-- Atap (tidak di-highlight) -->
  <polygon points="340,80 200,160 480,160" fill="#94908a"/>
  <polygon points="340,80 480,160 560,120 420,40" fill="#78716c"/>

  <!-- Garis horizontal dinding (tekstur batu) -->
  <line x1="200" y1="220" x2="480" y2="220" stroke="#a8a29e" stroke-width="1.5"/>
  <line x1="200" y1="280" x2="480" y2="280" stroke="#a8a29e" stroke-width="1.5"/>
  <line x1="200" y1="340" x2="480" y2="340" stroke="#a8a29e" stroke-width="1.5"/>

  <!-- Label -->
  <rect x="30" y="200" width="150" height="55" rx="12" fill="#f97316"/>
  <text x="105" y="223" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">Dinding Sisi</text>
  <text x="105" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">Candi</text>
  <!-- Arrow -->
  <line x1="180" y1="227" x2="200" y2="250" stroke="#f97316" stroke-width="3"/>
  <polygon points="200,250 192,242 202,242" fill="#f97316"/>

  <!-- Zoom prisma -->
  <circle cx="660" cy="200" r="90" fill="#fff7ed" stroke="#f97316" stroke-width="4"/>
  <!-- Prisma 3D -->
  <rect x="610" y="155" width="80" height="90" fill="#fb923c" rx="3"/>
  <polygon points="610,155 650,130 690,155" fill="#fed7aa"/>
  <polygon points="690,155 690,245 650,270 650,130" fill="#fdba74"/>
  <text x="660" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c2410c">Prisma Segi Empat</text>

  <!-- Label bawah -->
  <rect x="270" y="460" width="260" height="32" rx="8" fill="#1e40af" opacity="0.85"/>
  <text x="400" y="481" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">Candi Jawi — Pasuruan</text>
</svg>
