<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="stone3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d6d3d1"/>
      <stop offset="100%" stop-color="#a8a29e"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#sky3)"/>
  <!-- Ground -->
  <rect x="0" y="420" width="800" height="80" fill="#86efac"/>

  <!-- Candi body (abu-abu, tidak di-highlight) -->
  <rect x="220" y="300" width="360" height="120" fill="#c7c3c0" rx="4"/>
  <rect x="240" y="260" width="320" height="45" fill="#b5b0ac" rx="3"/>
  <rect x="265" y="225" width="270" height="40" fill="#a8a29e" rx="3"/>
  <rect x="290" y="195" width="220" height="35" fill="#9e9892" rx="3"/>
  <rect x="315" y="168" width="170" height="32" fill="#94908a" rx="3"/>

  <!-- Puncak KERUCUT — highlighted -->
  <polygon points="400,60 340,168 460,168" fill="#78716c"/>
  <!-- Highlight outline -->
  <polygon points="400,60 340,168 460,168" fill="none" stroke="#f97316" stroke-width="5"/>
  <!-- Titik puncak -->
  <circle cx="400" cy="60" r="8" fill="#f97316"/>

  <!-- Label puncak -->
  <rect x="490" y="80" width="200" height="55" rx="12" fill="#f97316"/>
  <text x="590" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Puncak Candi</text>
  <text x="590" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Meruncing</text>
  <!-- Arrow -->
  <line x1="490" y1="107" x2="465" y2="107" stroke="#f97316" stroke-width="3"/>
  <polygon points="465,107 475,102 475,112" fill="#f97316"/>

  <!-- Zoom kerucut -->
  <circle cx="150" cy="150" r="85" fill="#fff7ed" stroke="#f97316" stroke-width="4"/>
  <!-- Kerucut 3D -->
  <polygon points="150,80 100,195 200,195" fill="#fb923c"/>
  <ellipse cx="150" cy="195" rx="50" ry="14" fill="#fed7aa"/>
  <!-- Titik puncak -->
  <circle cx="150" cy="80" r="6" fill="#c2410c"/>
  <text x="150" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c2410c">Bentuk Kerucut</text>

  <!-- Label bawah -->
  <rect x="270" y="460" width="260" height="32" rx="8" fill="#1e40af" opacity="0.85"/>
  <text x="400" y="481" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">Candi Jawi — Pasuruan</text>
</svg>
