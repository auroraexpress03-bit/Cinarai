<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d6d3d1"/>
      <stop offset="100%" stop-color="#a8a29e"/>
    </linearGradient>
    <linearGradient id="stoneDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a8a29e"/>
      <stop offset="100%" stop-color="#78716c"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#sky)"/>

  <!-- Ground -->
  <rect x="0" y="400" width="800" height="100" fill="#86efac"/>
  <rect x="0" y="420" width="800" height="80" fill="#4ade80"/>

  <!-- Candi body (BALOK) — highlighted with orange outline -->
  <!-- Kaki candi -->
  <rect x="200" y="340" width="400" height="60" fill="url(#stone)" rx="4"/>
  <rect x="220" y="300" width="360" height="45" fill="url(#stone)" rx="3"/>

  <!-- Tubuh utama — BALOK (highlighted) -->
  <rect x="250" y="160" width="300" height="145" fill="url(#stone)" rx="4"/>
  <!-- Highlight outline merah/oranye pada tubuh utama -->
  <rect x="250" y="160" width="300" height="145" fill="none" stroke="#f97316" stroke-width="5" rx="4" stroke-dasharray="0"/>

  <!-- Atap bertingkat -->
  <rect x="270" y="130" width="260" height="35" fill="url(#stoneDark)" rx="3"/>
  <rect x="295" y="105" width="210" height="30" fill="url(#stoneDark)" rx="3"/>
  <rect x="320" y="82" width="160" height="28" fill="url(#stoneDark)" rx="3"/>
  <!-- Puncak -->
  <polygon points="400,30 350,82 450,82" fill="#57534e"/>

  <!-- Label -->
  <rect x="560" y="175" width="180" height="50" rx="12" fill="#f97316"/>
  <text x="650" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">Tubuh Candi</text>

  <!-- Arrow -->
  <line x1="555" y1="200" x2="555" y2="200" stroke="#f97316" stroke-width="3"/>
  <path d="M555 200 L560 195 L560 205 Z" fill="#f97316"/>
  <line x1="550" y1="200" x2="490" y2="220" stroke="#f97316" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Label bawah -->
  <rect x="270" y="460" width="260" height="32" rx="8" fill="#1e40af" opacity="0.85"/>
  <text x="400" y="481" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">Candi Jawi — Pasuruan</text>
</svg>
