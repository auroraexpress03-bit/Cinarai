<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#sky2)"/>
  <!-- Ground -->
  <rect x="0" y="400" width="800" height="100" fill="#86efac"/>

  <!-- Kaki candi — susunan batu (KUBUS) highlighted -->
  <!-- Row 1 bawah -->
  <rect x="100" y="340" width="600" height="60" fill="#d6d3d1" rx="2"/>
  <!-- Garis batu row 1 -->
  <line x1="200" y1="340" x2="200" y2="400" stroke="#a8a29e" stroke-width="2"/>
  <line x1="300" y1="340" x2="300" y2="400" stroke="#a8a29e" stroke-width="2"/>
  <line x1="400" y1="340" x2="400" y2="400" stroke="#a8a29e" stroke-width="2"/>
  <line x1="500" y1="340" x2="500" y2="400" stroke="#a8a29e" stroke-width="2"/>
  <line x1="600" y1="340" x2="600" y2="400" stroke="#a8a29e" stroke-width="2"/>

  <!-- Row 2 -->
  <rect x="120" y="280" width="560" height="60" fill="#c7c3c0" rx="2"/>
  <line x1="240" y1="280" x2="240" y2="340" stroke="#a8a29e" stroke-width="2"/>
  <line x1="360" y1="280" x2="360" y2="340" stroke="#a8a29e" stroke-width="2"/>
  <line x1="480" y1="280" x2="480" y2="340" stroke="#a8a29e" stroke-width="2"/>
  <line x1="600" y1="280" x2="600" y2="340" stroke="#a8a29e" stroke-width="2"/>

  <!-- Row 3 -->
  <rect x="140" y="230" width="520" height="50" fill="#d6d3d1" rx="2"/>
  <line x1="260" y1="230" x2="260" y2="280" stroke="#a8a29e" stroke-width="2"/>
  <line x1="380" y1="230" x2="380" y2="280" stroke="#a8a29e" stroke-width="2"/>
  <line x1="500" y1="230" x2="500" y2="280" stroke="#a8a29e" stroke-width="2"/>

  <!-- Highlight satu batu kubus -->
  <rect x="360" y="280" width="120" height="60" fill="none" stroke="#f97316" stroke-width="5" rx="3"/>
  <!-- Kubus 3D kecil di dalam batu yang di-highlight -->
  <rect x="375" y="293" width="40" height="34" fill="#fed7aa" rx="2"/>
  <polygon points="375,293 395,280 415,280 415,293" fill="#fdba74"/>
  <polygon points="415,280 415,293 415,327 415,327" fill="#fb923c"/>

  <!-- Label -->
  <rect x="530" y="270" width="220" height="55" rx="12" fill="#f97316"/>
  <text x="640" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Batu Penyusun</text>
  <text x="640" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Kaki Candi</text>
  <!-- Arrow -->
  <line x1="530" y1="305" x2="490" y2="310" stroke="#f97316" stroke-width="3"/>
  <polygon points="490,310 500,305 500,315" fill="#f97316"/>

  <!-- Zoom circle -->
  <circle cx="400" cy="160" r="80" fill="#fff7ed" stroke="#f97316" stroke-width="4"/>
  <!-- Kubus 3D zoom -->
  <rect x="345" y="130" width="60" height="60" fill="#fed7aa" rx="4"/>
  <polygon points="345,130 375,110 435,110 405,130" fill="#fdba74"/>
  <polygon points="405,130 435,110 435,170 405,190" fill="#fb923c"/>
  <text x="400" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c2410c">Bentuk Kubus</text>

  <!-- Label bawah -->
  <rect x="270" y="460" width="260" height="32" rx="8" fill="#1e40af" opacity="0.85"/>
  <text x="400" y="481" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">Candi Jawi — Pasuruan</text>
</svg>
